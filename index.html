<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock / Paper / Scissors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>Rock / Paper / Scissors</h1>
      <p class="subtitle">Pick your move</p>
    </header>

    <div class="buttons">
      <button class="btn" onclick="playRock()">
        <span>🪨</span>
        Rock
      </button>
      <button class="btn" onclick="playPaper()">
        <span>📄</span>
        Paper
      </button>
      <button class="btn" onclick="playScissors()">
        <span>✂️</span>
        Scissors
      </button>
    </div>

    <p id="result"></p>

    <script src="script.js"></script>
  </body>
</html>
