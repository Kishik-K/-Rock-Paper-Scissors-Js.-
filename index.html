<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock / Paper / Scissors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>Rock / Paper / Scissors</h1>
      <p class="subtitle">Pick your move</p>
    </header>

    

    <div class="buttons">
      <button class="btn" onclick="playRock()">🪨 Rock</button>
      <button class="btn" onclick="playPaper()">📄 Paper</button>
      <button class="btn" onclick="playScissors()">✂️ Scissors</button>
    </div>

    

    <p id="score"></p>
    <p id="result"></p>
    <button class="reset btn">RESET SCORE</button>

    <script src="script.js"></script>
  </body>
</html>
